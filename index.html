<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepler-186f | Controle de Mercado</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .painel {
            background: #111827;
            padding: 30px;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            width: 400px;
            text-align: center;
        }
        h2 { margin-top: 0; letter-spacing: 2px; }
        .linha { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #8892b0; }
        select {
            width: 100%;
            padding: 10px;
            background: #0b0f19;
            color: #fff;
            border: 1px solid #00ffcc;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: #0b0f19;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #00ccaa;
            box-shadow: 0 0 15px #00ffcc;
        }
        #resultado {
            margin-top: 20px;
            padding: 10px;
            background: #1f2937;
            border-radius: 5px;
            display: none;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="painel">
        <h2>SISTEMA KEPLER-186f</h2>
        <p style="color: #8892b0; font-size: 14px;">Terminal de Ajuste Econômico</p>
        
        <div class="linha">
            <label for="evento">Evento Galáctico:</label>
            <select id="evento">
                <option value="RADIACAO">Tempestade de Radiação (+25%)</option>
                <option value="DESCOBERTA">Descoberta de Jazida (-30%)</option>
                <option value="NORMAL">Normalizar (100%)</option>
            </select>
        </div>

        <div class="linha">
            <label for="setor">Setor Afetado:</label>
            <select id="setor">
                <option value="MINERAL">Mineral (Cristais)</option>
                <option value="COMBUSTIVEL">Combustível (Gás)</option>
                <option value="DADOS">Tecnologia (Holodiscos)</option>
            </select>
        </div>

        <button onclick="enviarOrdem()">TRANSMITIR ORDEM</button>

        <div id="resultado"></div>
    </div>

    <script>
        async function enviarOrdem() {
            const eventoSelecionado = document.getElementById('evento').value;
            const setorSelecionado = document.getElementById('setor').value;
            const divResultado = document.getElementById('resultado');

            const btn = document.querySelector('button');
            btn.innerText = "TRANSMITINDO...";
            btn.disabled = true;

            try {
                const resposta = await fetch('/processar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evento: eventoSelecionado,
                        setor: setorSelecionado
                    })
                });

                const dados = await resposta.json();

                divResultado.style.display = 'block';
                if (resposta.ok) {
                    divResultado.style.color = '#00ffcc';
                    divResultado.innerText = `SUCESSO: ${dados.detalhes}`;
                } else {
                    divResultado.style.color = '#ff4c4c';
                    divResultado.innerText = `ERRO: ${dados.detail}`;
                }
            } catch (erro) {
                divResultado.style.display = 'block';
                divResultado.style.color = '#ff4c4c';
                divResultado.innerText = "FALHA NA COMUNICAÇÃO: O servidor está rodando?";
            } finally {
                btn.innerText = "TRANSMITIR ORDEM";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
